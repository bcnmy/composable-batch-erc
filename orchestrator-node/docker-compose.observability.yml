services:
  # Jaeger - Distributed tracing backend with UI
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    command: ["--query.base-path=/jaeger"]

  # Note: This setup is for local development only
  # For production, use your existing Grafana Cloud setup
